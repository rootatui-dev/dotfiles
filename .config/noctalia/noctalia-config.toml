[system.monitor]
cpu_poll_seconds = 3.0
disk_poll_seconds = 10.0
enabled = true
gpu_poll_seconds = 3.0
memory_poll_seconds = 3.0
network_poll_seconds = 3.0

[theme]
builtin = "Noctalia"
community_palette = "Monochrome"
custom_palette = "theme"
mode = "light"
source = "custom"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "gtk3", "kitty", "niri", "qt" ]
    community_ids = [ "obsidian", "zed", "discord", "steam", "telegram", "yazi" ]
    enable_builtin_templates = true
    enable_community_templates = true

[wallpaper]
directory = "/home/artemii/.config/wallpapers"
directory_dark = "/home/artemii/.config/wallpapers/dark"
directory_light = "/home/artemii/.config/wallpapers/light"
edge_smoothness = 0.30000001192092896
enabled = true
fill_color = ""
fill_mode = "crop"
per_monitor_directories = false
transition = [ "disc", "fade", "honeycomb", "stripes", "wipe", "zoom" ]
transition_duration = 1500.0
transition_on_startup = false

    [wallpaper.automation]
    enabled = false
    interval_minutes = 0
    order = "random"
    recursive = true

[weather]
address = "Pyatigorsk"
auto_locate = false
effects = false
enabled = true
refresh_minutes = 30
unit = "metric"

[widget.active_window]
icon_size = 14.0
max_length = 260.0
min_length = 80.0
title_scroll = "none"
type = "active_window"

[widget.control-center]
glyph = "settings"
type = "control-center"

[widget.cpu]
stat = "cpu_usage"
type = "sysmon"

[widget.date]
format = "{:%a %d %b}"
type = "clock"

[widget.input_volume]
device = "input"
type = "volume"

[widget.keyboard_layout]
cycle_command = ""
hide_when_single_layout = false
