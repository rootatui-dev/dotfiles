[audio]
enable_overdrive = true

[backdrop]
blur_intensity = 0.67999998480081558
tint_intensity = 0.0

[bar.default]
border = "primary"
center = [ "workspaces" ]
end = [
    "media",
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "session"
]
margin_ends = 250
start = [ "wallpaper", "clock", "control-center" ]
widget_spacing = 12

